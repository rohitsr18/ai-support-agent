<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pragna</title>
    <style>
        :root {
            --bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card: #ffffff;
            --ink: #1a202c;
            --muted: #718096;
            --brand: #667eea;
            --brand-dark: #5568d3;
            --user: #edf2f7;
            --user-text: #667eea;
            --bot: #f7fafc;
            --bot-border: #e2e8f0;
            --line: #e2e8f0;
            --success: #48bb78;
        }
        * { 
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html, body {
            width: 100%;
            height: 100%;
        }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .shell {
            width: min(900px, 100%);
            height: min(85vh, 750px);
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .head {
            padding: 20px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }
        .title { 
            font-weight: 800;
            font-size: 24px;
            letter-spacing: -0.5px;
        }
        .note { 
            font-size: 13px;
            opacity: 0.9;
            font-weight: 500;
        }
        .chat {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px;
            background: linear-gradient(to bottom, #ffffff 0%, #f8f9fa 100%);
            scroll-behavior: smooth;
        }
        .chat::-webkit-scrollbar {
            width: 6px;
        }
        .chat::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat::-webkit-scrollbar-thumb {
            background: #cbd5e0;
            border-radius: 3px;
        }
        .chat::-webkit-scrollbar-thumb:hover {
            background: #a0aec0;
        }
        .msg-wrapper {
            display: flex;
            margin-bottom: 12px;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-wrapper.user {
            justify-content: flex-end;
        }
        .msg {
            padding: 12px 16px;
            border-radius: 14px;
            max-width: 75%;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 14px;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        .msg.user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 14px 4px 14px 14px;
            font-weight: 500;
        }
        .msg.bot {
            background: var(--bot);
            color: var(--ink);
            border: 1px solid var(--bot-border);
            border-radius: 4px 14px 14px 14px;
        }
        .msg.bot.typing::after {
            content: '';
            animation: typing 1.4s infinite;
        }
        @keyframes typing {
            0%, 60%, 100% { content: ''; }
            20% { content: '●'; }
            40% { content: '● ●'; }
            60% { content: '● ● ●'; }
        }
        .foot {
            border-top: 1px solid var(--line);
            padding: 16px;
            background: #fafbfc;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .input-row {
            display: flex;
            gap: 8px;
            width: 100%;
        }
        input, textarea, button {
            font: inherit;
            border-radius: 10px;
            border: 2px solid var(--line);
            padding: 11px 14px;
            transition: all 0.2s ease;
            background: white;
        }
        input::placeholder, textarea::placeholder {
            color: #cbd5e0;
            font-weight: 500;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: #f9fafb;
        }
        textarea {
            width: 100%;
            min-height: 65px;
            resize: vertical;
            max-height: 150px;
            font-family: inherit;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            padding: 11px 20px;
            white-space: nowrap;
            min-width: 80px;
            transition: all 0.2s ease;
        }
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }
        button:active:not(:disabled) {
            transform: translateY(0);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <main class="shell">
        <header class="head">
            <div>
                <div class="title">Pragna</div>
                <div class="note">AI Support Assistant</div>
            </div>
        </header>
        <section id="chat" class="chat"></section>
        <section class="foot">
            <input id="name" placeholder="Your name (press Enter)" autocomplete="off" />
            <textarea id="message" placeholder="Type your question here... (Shift+Enter for new line)"></textarea>
            <div class="input-row">
                <button id="send">Send Message</button>
            </div>
        </section>
    </main>

    <script>
        // ChatUI: Handles all UI interactions and rendering
        class ChatUI {
            constructor() {
                this.chatEl = document.getElementById("chat");
                this.nameEl = document.getElementById("name");
                this.messageEl = document.getElementById("message");
                this.sendEl = document.getElementById("send");
                this.greetedByName = false;
                this.sessionId = Math.random().toString(36).substr(2, 9);
                this.initialize();
            }

            initialize() {
                this.setupEventListeners();
                this.displayWelcomeMessage();
                this.nameEl.focus();
            }

            setupEventListeners() {
                this.sendEl.addEventListener("click", () => this.handleSendMessage());
                
                this.nameEl.addEventListener("keydown", (e) => {
                    if (e.key === "Enter") {
                        e.preventDefault();
                        this.handleNameEntry();
                    }
                });
                
                this.nameEl.addEventListener("blur", () => this.handleNameEntry());
                
                this.messageEl.addEventListener("keydown", (e) => {
                    if (e.key === "Enter" && !e.shiftKey) {
                        e.preventDefault();
                        this.handleSendMessage();
                    }
                });
            }

            displayWelcomeMessage() {
                this.appendMessage("bot", "Welcome to Pragna! 👋 What's your name?");
            }

            handleNameEntry() {
                const name = this.nameEl.value.trim();
                if (name && !this.greetedByName) {
                    this.appendMessage("bot", `Hi ${name}! How can I help you today?`);
                    this.greetedByName = true;
                    this.messageEl.focus();
                }
            }

            handleSendMessage() {
                const name = this.nameEl.value.trim();
                const message = this.messageEl.value.trim();
                
                if (!message) {
                    this.messageEl.focus();
                    return;
                }
                
                if (!name) {
                    this.appendMessage("bot", "Please tell me your name before we continue.");
                    this.nameEl.focus();
                    return;
                }
                
                this.handleNameEntry();
                this.appendMessage("user", message);
                this.messageEl.value = "";
                this.sendMessage(name, message);
            }

            appendMessage(role, text) {
                const wrapper = document.createElement("div");
                wrapper.className = "msg-wrapper " + role;
                
                const div = document.createElement("div");
                div.className = "msg " + role;
                div.textContent = text;
                
                wrapper.appendChild(div);
                this.chatEl.appendChild(wrapper);
                this.chatEl.scrollTop = this.chatEl.scrollHeight;

                return wrapper;
            }

            showTypingIndicator() {
                const wrapper = document.createElement("div");
                wrapper.className = "msg-wrapper bot";
                const div = document.createElement("div");
                div.className = "msg bot typing";
                wrapper.appendChild(div);
                this.chatEl.appendChild(wrapper);
                this.chatEl.scrollTop = this.chatEl.scrollHeight;
                return wrapper;
            }

            async sendMessage(name, message) {
                const typingIndicator = this.showTypingIndicator();
                this.sendEl.disabled = true;

                try {
                    const response = await fetch("/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ 
                            session_id: this.sessionId, 
                            message, 
                            name 
                        })
                    });

                    const data = await response.json();
                    typingIndicator.remove();
                    this.appendMessage("bot", data.reply || "Sorry, I couldn't process that. Please try again.");
                } catch (err) {
                    typingIndicator.remove();
                    this.appendMessage("bot", "Sorry, I'm having trouble connecting. Please check your connection and try again.");
                } finally {
                    this.sendEl.disabled = false;
                    this.messageEl.focus();
                }
            }
        }

        // Initialize the chat UI
        new ChatUI();
    </script>
</body>
</html>
