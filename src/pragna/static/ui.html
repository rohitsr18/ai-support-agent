<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pragna</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 700px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .header-info h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .header-info p {
            font-size: 12px;
            opacity: 0.8;
        }

        .status-badge {
            margin-left: auto;
            background: #10b981;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8fafc;
        }

        .message {
            display: flex;
            margin-bottom: 16px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
            font-size: 14px;
        }

        .message.agent .message-content {
            background: white;
            color: #1e293b;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 4px;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-meta {
            font-size: 11px;
            margin-top: 4px;
            opacity: 0.6;
        }

        .escalation-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #fef3c7;
            color: #92400e;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            margin-top: 8px;
        }

        .ticket-id {
            font-family: monospace;
            background: #f1f5f9;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
        }

        .typing-indicator {
            display: none;
            padding: 12px 16px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }

        .typing-indicator.show {
            display: block;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #94a3b8;
            border-radius: 50%;
            margin-right: 4px;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-6px); }
        }

        .input-area {
            padding: 16px 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area input:focus {
            border-color: #667eea;
        }

        .input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .input-area button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .input-area button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .quick-actions {
            padding: 12px 20px;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
        }

        .quick-actions p {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 8px;
        }

        .quick-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .quick-btn {
            padding: 8px 14px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            font-size: 12px;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .new-session-btn {
            background: none;
            border: 1px solid #94a3b8;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 11px;
            color: #64748b;
            cursor: pointer;
        }

        .new-session-btn:hover {
            background: #e2e8f0;
        }

        .session-info {
            padding: 8px 20px;
            background: #f1f5f9;
            font-size: 12px;
            color: #64748b;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-icon">🤖</div>
            <div class="header-info">
                <h1>Pragna</h1>
                <p>AI Support Assistant</p>
            </div>
            <div class="status-badge">Online</div>
        </div>

        <div class="session-info">
            <button class="new-session-btn" onclick="newSession()">New Session</button>
        </div>

        <div class="chat-area" id="chat-area">

        </div>

        <div class="quick-actions">
            <p>Quick actions:</p>
            <div class="quick-buttons">
                <button class="quick-btn" onclick="sendQuickMessage('I want to track my order')">Track Order</button>
                <button class="quick-btn" onclick="sendQuickMessage('I want to return an item')">Return Item</button>
                <button class="quick-btn" onclick="sendQuickMessage('What is your refund policy?')">Refund Policy</button>
                <button class="quick-btn" onclick="sendQuickMessage('I need to speak with a human agent')">Talk to Human</button>
            </div>
        </div>

        <div class="input-area">
            <input 
                type="text" 
                id="message-input" 
                placeholder="Type your message..." 
                onkeypress="handleKeyPress(event)"
            >
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const API_URL = '/chat';
        let sessionId = generateSessionId();

        function generateSessionId() {
            return 'session-' + Math.random().toString(36).substr(2, 9);
        }

        function init() {
            document.getElementById('message-input').focus();
            addMessage("Hi! I'm Pragna, your AI support assistant. I can help with order tracking, returns, and general questions. What's your name?", 'agent');
        }

        function newSession() {
            sessionId = generateSessionId();
            document.getElementById('chat-area').innerHTML = '';
            addMessage("Hi! I'm Pragna, your AI support assistant. I can help with order tracking, returns, and general questions. What's your name?", 'agent');
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function sendQuickMessage(message) {
            document.getElementById('message-input').value = message;
            sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const sendBtn = document.getElementById('send-btn');
            const chatArea = document.getElementById('chat-area');
            const message = input.value.trim();

            if (!message) return;

            // Add user message
            addMessage(message, 'user');
            input.value = '';
            sendBtn.disabled = true;

            // Show typing indicator
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message agent';
            typingDiv.innerHTML = `
                <div class="typing-indicator show">
                    <span></span><span></span><span></span>
                </div>
            `;
            chatArea.appendChild(typingDiv);
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId
                    })
                });

                const data = await response.json();

                // Remove typing indicator
                typingDiv.remove();

                // Add agent response (API returns 'reply' field)
                addMessage(data.reply, 'agent', data.escalated, data.ticket_id);

            } catch (error) {
                typingDiv.remove();
                addMessage('Sorry, I encountered an error. Please try again.', 'agent');
                console.error('Error:', error);
            }

            sendBtn.disabled = false;
            input.focus();
        }

        function addMessage(text, sender, escalated = false, ticketId = null) {
            const chatArea = document.getElementById('chat-area');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            let extraContent = '';
            if (escalated && ticketId) {
                extraContent = `
                    <div class="escalation-badge">
                        ⚠️ Escalated - Ticket: <span class="ticket-id">${ticketId}</span>
                    </div>
                `;
            }

            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            messageDiv.innerHTML = `
                <div class="message-content">
                    ${text.replace(/\n/g, '<br>')}
                    ${extraContent}
                    <div class="message-meta">${time}</div>
                </div>
            `;

            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Initialize
        init();
    </script>
</body>
</html>
